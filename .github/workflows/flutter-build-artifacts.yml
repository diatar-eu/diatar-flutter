name: Build Flutter Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  android:
    name: Android APK (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Diatar
          - DiaVetito

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        working-directory: ${{ matrix.app }}
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ${{ matrix.app }}
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android-apk
          path: ${{ matrix.app }}/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  linux:
    name: Linux Bundle (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Diatar
          - DiaVetito

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter Pub Get
        working-directory: ${{ matrix.app }}
        run: flutter pub get

      - name: Build Linux (Release)
        working-directory: ${{ matrix.app }}
        run: flutter build linux --release

      - name: Package Linux Bundle
        working-directory: ${{ matrix.app }}/build/linux/x64/release
        run: tar -czf ../../../../${{ matrix.app }}-linux.tar.gz bundle

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-linux
          path: ${{ matrix.app }}/${{ matrix.app }}-linux.tar.gz
          if-no-files-found: error

  windows:
    name: Windows Bundle (${{ matrix.app }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Diatar
          - DiaVetito

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter Pub Get
        working-directory: ${{ matrix.app }}
        run: flutter pub get

      - name: Build Windows (Release)
        working-directory: ${{ matrix.app }}
        run: flutter build windows --release

      - name: Package Windows Bundle
        shell: pwsh
        run: |
          $bundlePath = "${{ matrix.app }}/build/windows/x64/runner/Release"
          $zipPath = "${{ matrix.app }}/${{ matrix.app }}-windows.zip"
          Compress-Archive -Path "$bundlePath/*" -DestinationPath $zipPath -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: ${{ matrix.app }}/${{ matrix.app }}-windows.zip
          if-no-files-found: error

  macos:
    name: macOS App (${{ matrix.app }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Diatar
          - DiaVetito

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Flutter Pub Get
        working-directory: ${{ matrix.app }}
        run: flutter pub get

      - name: Build macOS (Release)
        working-directory: ${{ matrix.app }}
        run: flutter build macos --release

      - name: Package macOS App
        shell: pwsh
        run: |
          $appPath = "${{ matrix.app }}/build/macos/Build/Products/Release"
          $zipPath = "${{ matrix.app }}/${{ matrix.app }}-macos.zip"
          Compress-Archive -Path "$appPath/*" -DestinationPath $zipPath -Force

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-macos
          path: ${{ matrix.app }}/${{ matrix.app }}-macos.zip
          if-no-files-found: error

  ios:
    name: iOS App (No Sign) (${{ matrix.app }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Diatar
          - DiaVetito

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Flutter Pub Get
        working-directory: ${{ matrix.app }}
        run: flutter pub get

      - name: Build iOS (Release, No Codesign)
        working-directory: ${{ matrix.app }}
        run: flutter build ios --release --no-codesign

      - name: Package iOS App Bundle
        shell: pwsh
        run: |
          $appPath = "${{ matrix.app }}/build/ios/iphoneos"
          $zipPath = "${{ matrix.app }}/${{ matrix.app }}-ios-nosign.zip"
          Compress-Archive -Path "$appPath/*" -DestinationPath $zipPath -Force

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-ios-nosign
          path: ${{ matrix.app }}/${{ matrix.app }}-ios-nosign.zip
          if-no-files-found: error

  release-assets:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - android
      - linux
      - windows
      - macos
      - ios
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload Assets To GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.apk
            dist/**/*.tar.gz
            dist/**/*.zip
